name: Run Daily Team Discussion Points Agent

on:
  # Run Mon-Fri at 6am UTC
  schedule:
    - cron: '0 6 * * 1-5'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Daily Team Discussion Points Agent
        timeout-minutes: 10
        env:
          CRAFT_ANTHROPIC_API_KEY: ${{ secrets.CRAFT_ANTHROPIC_API_KEY }}
        run: |
          bun run src/index.tsx \
            -w "${{ secrets.CRAFT_KB_MCP_URL }}" \
            -a "@daily-team-discussion-points" \
            -p "dry-run: don't create discussion points on any day, just try to find todays daily note and return if you succeeded" \
            --output-format stream-json \
            -m claude-opus-4-5-20251101 \
            --debug

      - name: Show debug log
        if: always()
        run: cat /tmp/craft-debug.log || echo "No debug log found"
