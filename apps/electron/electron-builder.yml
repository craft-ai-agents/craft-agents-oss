appId: com.g4educacao.g4os
productName: G4 OS
copyright: Copyright © 2026 G4 Educacao

electronVersion: "39.2.7"

# Hook to compile macOS 26+ Liquid Glass icon after packaging
afterPack: scripts/afterPack.cjs

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - package.json
  # Include bundled MCP servers (bridge + session) for Codex sessions
  - resources/bridge-mcp-server/**/*
  - resources/session-mcp-server/**/*
  # Note: Bundled assets (docs, themes, permissions, tool-icons) are in resources/
  # and copied to dist/resources/ by build:copy. They're included via dist/**/* above.
  # Include SDK for subprocess execution
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  # Include network interceptor for API error capture and MCP schema injection
  - packages/shared/src/network-interceptor.ts
  # Include bundled Bun runtime (platform-specific, set by build script)
  - vendor/bun/**/*
  # Include bundled Codex binary (platform-specific, downloaded by build script)
  - vendor/codex/**/*
  # Include bundled developer tools (git, node, uv) as fallbacks for vanilla machines
  - vendor/git/**/*
  - vendor/node/**/*
  - vendor/uv/**/*
  # Exclude everything else from node_modules
  - "!node_modules/**/*"
  - node_modules/@anthropic-ai/**/*

extraMetadata:
  main: dist/main.cjs

# Auto-update: electron-updater fetches from this URL for update manifests (.yml files)
publish:
  provider: generic
  url: https://g4os-viewer.pages.dev/electron

# Disable ASAR to avoid decompression overhead and click delays
asar: false

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  # macOS 26+ Liquid Glass: Tell macOS to look for icon in Assets.car
  # The value must match --app-icon used in actool (see afterPack.js)
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Exclude binaries for other platforms
  files:
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-linux"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-linux"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-win32"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/codex/win32-*/**"
    # Exclude Windows-only bundled tool binaries
    - "!vendor/git/cmd/**"
    - "!vendor/node/node.exe"
    - "!vendor/uv/uv.exe"
  # Use predictable naming for macOS packages (applies to zip; dmg uses its own config below)
  artifactName: "G4OS-${arch}.${ext}"
  # Code signing & notarization (disabled by default for local builds)
  # To enable: set CSC_LINK, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # notarize:
  #   teamId: ${APPLE_TEAM_ID}

dmg:
  # Use predictable naming: G4OS-arm64.dmg, G4OS-x64.dmg
  artifactName: "G4OS-${arch}.dmg"
  # Custom background (multi-resolution TIFF with 1x+2x for retina support)
  background: resources/dmg-background.tiff
  # Use app icon as the mounted volume icon in Finder
  icon: resources/icon.icns
  iconSize: 80
  title: "G4 OS"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: G4OS-x64.exe
  artifactName: "G4OS-${arch}.${ext}"
  files:
    # Exclude binaries for other platforms
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-linux"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-linux"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-darwin"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-darwin"
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    # Exclude Unix-only bundled tool binaries
    - "!vendor/git/bin/**"
    - "!vendor/git/libexec/**"
    - "!vendor/node/bin/**"
    - "!vendor/node/lib/**"
    - "!vendor/uv/uv"
    # WORKAROUND: Exclude vendor binaries from regular files on Windows.
    # electron-builder's npm node module collector causes EBUSY errors when copying
    # .exe files because it scans/locks files while simultaneously trying to copy them.
    # Moving to extraResources avoids this by copying before the collector runs.
    # See: https://github.com/electron-userland/electron-builder/issues/8250
    - "!vendor/bun/**/*"
    - "!vendor/git/**/*"
    - "!vendor/node/**/*"
    - "!vendor/uv/**/*"
  # Copy vendor binaries as extraResources to avoid EBUSY file locking (see comment above)
  extraResources:
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/git/cmd
      to: vendor/git/cmd
    - from: vendor/git/mingw64
      to: vendor/git/mingw64
    - from: vendor/node/node.exe
      to: vendor/node/node.exe
    - from: vendor/uv/uv.exe
      to: vendor/uv/uv.exe

nsis:
  oneClick: true
  # Per-user install to %LOCALAPPDATA%\Programs\ (not Program Files).
  # Bun subprocess cannot read/write files in Program Files due to Windows permissions.
  perMachine: false
  deleteAppDataOnUninstall: true

linux:
  icon: resources/icon.png
  category: Utility
  maintainer: "G4 Educacao <g4os@g4educacao.com>"
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "G4OS-${arch}.${ext}"
  # Exclude binaries for other platforms
  files:
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-darwin"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-darwin"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-win32"
    - "!node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/arm64-linux"
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    # Exclude Windows-only bundled tool binaries
    - "!vendor/git/cmd/**"
    - "!vendor/node/node.exe"
    - "!vendor/uv/uv.exe"
